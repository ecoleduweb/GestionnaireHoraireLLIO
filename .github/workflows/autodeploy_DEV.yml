name: Deployer LLIO DEV

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Full Application
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          key: ${{ secrets.DEV_SSH_KEY }}
          username: ${{ secrets.SSH_USERNAME }}
          debug: true

          script: |
            set -e

            sudo systemctl stop llio-api.service || true
            sudo systemctl stop llio-frontend.service || true

            mkdir -p /root/logs
            DATE=$(date +'%Y-%m-%d_%H-%M')

            if [ -f "/root/ProjetLLIO2025/GestionnaireHoraire/API/logs.txt" ]; then
              cp /root/ProjetLLIO2025/GestionnaireHoraire/API/logs.txt /root/logs/logs_llio_$DATE.txt
            fi

            cd /root/ProjetLLIO2025
            rm -rf GestionnaireHoraire

            git clone https://github.com/ecoleduweb/GestionnaireHoraire.git

            mkdir -p /root/ProjetLLIO2025/GestionnaireHoraire/docs/Backup

            cat > /root/ProjetLLIO2025/GestionnaireHoraire/docs/Backup/db.config << EOF
            DB_USER="${{ secrets.DB_USER }}"
            DB_PASS="${{ secrets.DB_PASSWORD }}"
            DB_NAME="${{ secrets.DB_NAME_RUN }}"
            DB_HOST="${{ secrets.DB_HOST }}"
            DB_PORT="${{ secrets.DB_PORT }}"
            BACKUP_DIR="/var/backups/mariadb"
            RETENTION_DAYS=365
            EOF

            chmod 600 /root/ProjetLLIO2025/GestionnaireHoraire/docs/Backup/db.config

            if [ -f "/root/ProjetLLIO2025/GestionnaireHoraire/docs/Backup/backup.sh" ]; then
              chmod +x /root/ProjetLLIO2025/GestionnaireHoraire/docs/Backup/backup.sh

              sed -i 's/mariadb-dump/mariadb-dump --no-defaults/g' /root/ProjetLLIO2025/GestionnaireHoraire/docs/Backup/backup.sh

              /root/ProjetLLIO2025/GestionnaireHoraire/docs/Backup/backup.sh
            fi

            cd /root/ProjetLLIO2025/GestionnaireHoraire/API

            cat > .env << EOF
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME_RUN=${{ secrets.DB_NAME_RUN }}
            DB_NAME_TEST=${{ secrets.DB_NAME_TEST }}
            ENV=${{ secrets.ENV }}
            AZUREAD_CLIENT_ID=${{ secrets.AZUREAD_CLIENT_ID }}
            AZUREAD_CLIENT_SECRET=${{ secrets.AZUREAD_CLIENT_SECRET }}
            AZUREAD_CALLBACK_URL=${{ secrets.AZUREAD_CALLBACK_URL }}
            SESSION_MAX_AGE=${{ secrets.SESSION_MAX_AGE }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            JWT_DURATION=${{ secrets.JWT_DURATION }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            ENABLE_TRACING=true
            TRACE_URL=https://telemetry.edwrdl.ca/traces
            APPLICATION_NAME=API_LLIO_DEV
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            EOF

            /usr/local/go/bin/go mod tidy
            /usr/local/go/bin/go build -o app

            cd /root/ProjetLLIO2025/GestionnaireHoraire/LLIO2025

            cat > .env << EOF
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            PUBLIC_ENABLED_TELEMETRY=true
            PUBLIC_TRACE_URL=https://telemetry.edwrdl.ca/traces
            PUBLIC_APPLICATION_NAME=LLIO_DEV
            BASE_PATH=/llio-frontend
            EOF

            npm install
            npm run build

            sudo systemctl start llio-api.service || true
            sudo systemctl start llio-frontend.service || true

            sudo systemctl status llio-api.service --no-pager
            sudo systemctl status llio-frontend.service --no-pager

            echo " Deployment completed!"